name: Publish SDK

on:
  push:
    tags:
      - 'sdk-v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build SDK
        run: npm --prefix packages/sdk run build

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#sdk-v}"
          PACKAGE_VERSION=$(node -p "require('./packages/sdk/package.json').version")

          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match packages/sdk/package.json version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --prefix packages/sdk
