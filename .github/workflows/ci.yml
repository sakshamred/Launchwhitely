name: CI

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    # Placeholder values so the build/typecheck can run without real secrets.
    # Prisma `generate` needs DIRECT_URL to resolve; the Supabase + DB vars are
    # read at module load. None of these connect to a real service at build time.
    env:
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/postgres
      DATABASE_URL: postgresql://postgres:postgres@localhost:6543/postgres?pgbouncer=true
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build app
        run: npm run build

      - name: Build SDK
        run: npm run sdk:build
