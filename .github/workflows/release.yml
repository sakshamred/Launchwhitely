name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Build binaries for every target ───────────────────────────────────────
  build:
    name: Build · ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-13
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-2022
            archive: zip
            exe_suffix: .exe
            # Link the CRT statically so the binary runs on every Windows machine
            rustflags: -C target-feature=+crt-static

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install cross (for aarch64-linux)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (native)
        if: "!matrix.cross"
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo build --release --target ${{ matrix.target }} -p launchwhitely

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} -p launchwhitely

      # ── Package ─────────────────────────────────────────────────────────────
      - name: Package (tar.gz, Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          BIN="launchwhitely"
          SRC="target/${{ matrix.target }}/release/${BIN}"
          ARCHIVE="${BIN}-${{ matrix.target }}.tar.gz"
          cp "${SRC}" "${BIN}"
          tar czf "${ARCHIVE}" "${BIN}"
          echo "ARTIFACT=${ARCHIVE}" >> "${GITHUB_ENV}"

      - name: Package (zip, Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $bin = "launchwhitely.exe"
          $src = "target\${{ matrix.target }}\release\${bin}"
          $archive = "launchwhitely-${{ matrix.target }}.zip"
          Copy-Item $src $bin
          Compress-Archive -Path $bin -DestinationPath $archive
          "ARTIFACT=${archive}" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: launchwhitely-${{ matrix.target }}
          path: ${{ env.ARTIFACT }}
          if-no-files-found: error

  # ── Run tests before publishing (sanity gate) ────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-test-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo test
      - run: cargo clippy -- -D warnings
      - run: cargo fmt --check

  # ── Publish GitHub Release ───────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [build, test]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}  # e.g. v0.2.0-beta is pre-release
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            launchwhitely-*.tar.gz
            launchwhitely-*.zip

  # ── Publish to crates.io ─────────────────────────────────────────────────
  publish-crate:
    name: Publish crates.io
    needs: release
    runs-on: ubuntu-22.04
    environment: crates-io          # Requires CARGO_REGISTRY_TOKEN secret
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish launchwhitely-core
        run: cargo publish -p launchwhitely-core --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for crates.io index
        run: sleep 30
      - name: Publish launchwhitely
        run: cargo publish -p launchwhitely --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ── Publish npm package ──────────────────────────────────────────────────
  publish-npm:
    name: Publish npm
    needs: release
    runs-on: ubuntu-22.04
    environment: npm                 # Requires NPM_TOKEN secret
    defaults:
      run:
        working-directory: npm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
